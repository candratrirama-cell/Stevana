<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi @maramadhona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    
    <style>
        .neo-brutalism {
            border: 4px solid black;
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
            border-radius: 0px;
        }
        .neo-btn:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body class="bg-yellow-400 flex items-center justify-center min-h-screen p-4 font-mono">

    <div class="bg-white p-8 neo-brutalism w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-2 uppercase italic">Donasi @maramadhona</h1>
        <p class="mb-6 font-bold border-b-2 border-black pb-2 text-xs">MINIMAL DONASI RP 100</p>

        <div id="setup-area">
            <input type="number" id="amount" min="100" placeholder="MASUKKAN NOMINAL" 
                class="w-full p-4 border-4 border-black font-bold mb-4 focus:outline-none focus:bg-yellow-50">
            <button onclick="generateDonasi()" id="btn-pay"
                class="w-full bg-blue-500 text-white font-bold py-4 neo-brutalism neo-btn uppercase tracking-widest">
                BUAT QRIS
            </button>
        </div>

        <div id="qris-area" class="hidden mt-4">
            <p class="font-bold mb-4 uppercase">SCAN QRIS DISINI:</p>
            <div class="border-4 border-black p-4 inline-block bg-white shadow-inner">
                <canvas id="canvas-qris" class="mx-auto"></canvas>
            </div>
            <p id="info-amount" class="mt-4 text-2xl font-black text-blue-600"></p>
            <p class="mt-2 font-bold animate-pulse text-red-600 uppercase italic">Menunggu Pembayaran...</p>
        </div>

        <div id="success-area" class="hidden mt-4">
            <div class="text-6xl mb-4">🚀</div>
            <h2 class="text-2xl font-black uppercase text-green-600">PEMBAYARAN MASUK!</h2>
            <p class="font-bold uppercase">Terima kasih banyak, Bang @maramadhona!</p>
            <button onclick="location.reload()" class="mt-6 text-sm underline font-bold">KEMBALI</button>
        </div>
    </div>

    <script>
        const API_KEY = "91b24c8aeb3d364a80742a847797553b";
        let intervalCek;

        async function generateDonasi() {
            const amount = document.getElementById('amount').value;
            const btn = document.getElementById('btn-pay');

            if (amount < 100) {
                alert("Minimal Rp 100!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SABAR...";
            const refID = "MARA-" + Date.now();

            try {
                const res = await fetch("https://hokto.my.id/produksi/payment/?api=create_qris", {
                    method: "POST",
                    headers: { "X-API-KEY": API_KEY, "Content-Type": "application/json" },
                    body: JSON.stringify({ amount: parseInt(amount), partnerReferenceNo: refID })
                });

                const data = await res.json();
                
                // Ambil teks QRIS dari respon API (qrString)
                const qrText = data.qrString || (data.data ? data.data.qrString : null);

                if (qrText) {
                    // Merubah teks QRIS menjadi Gambar di Canvas
                    const canvas = document.getElementById('canvas-qris');
                    QRCode.toCanvas(canvas, qrText, { width: 250, margin: 2 }, function (error) {
                        if (error) console.error(error);
                        
                        document.getElementById('info-amount').innerText = "Rp " + parseInt(amount).toLocaleString();
                        document.getElementById('setup-area').classList.add('hidden');
                        document.getElementById('qris-area').classList.remove('hidden');
                        
                        // Cek status tiap 5 detik
                        mulaiPolling(refID);
                    });
                } else {
                    alert("Gagal ambil data QRIS. Cek saldo/API Key.");
                    btn.disabled = false;
                    btn.innerText = "BUAT QRIS";
                }
            } catch (err) {
                alert("Error koneksi!");
                btn.disabled = false;
            }
        }

        function mulaiPolling(ref) {
            intervalCek = setInterval(async () => {
                try {
                    const res = await fetch(`https://hokto.my.id/produksi/payment/?api=check_status&partnerReferenceNo=${ref}`, {
                        headers: { "X-API-KEY": API_KEY }
                    });
                    const data = await res.json();

                    if (data.status === "PAID" || (data.data && data.data.status === "PAID")) {
                        clearInterval(intervalCek);
                        document.getElementById('qris-area').classList.add('hidden');
                        document.getElementById('success-area').classList.remove('hidden');
                    }
                } catch (e) {
                    console.log("Cek...");
                }
            }, 5000);
        }
    </script>
</body>
</html>
