<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi @maramadhona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap');
        
        body { font-family: 'Space Grotesk', sans-serif; }
        /* Gaya Neo-Brutalism kesukaanmu */
        .neo-brutalism {
            border: 4px solid black;
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,1);
            border-radius: 0px;
        }
        .neo-btn {
            border: 3px solid black;
            box-shadow: 5px 5px 0px 0px rgba(0,0,0,1);
            transition: all 0.1s;
        }
        .neo-btn:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(5px, 5px);
        }
        input { border-radius: 0px !important; }
    </style>
</head>
<body class="bg-yellow-400 flex items-center justify-center min-h-screen p-6">

    <div class="bg-white p-8 neo-brutalism w-full max-w-md text-center">
        <h1 class="text-3xl font-black mb-1 uppercase italic tracking-tighter text-black">Donasi @maramadhona</h1>
        <p class="mb-6 font-bold border-b-4 border-black pb-2 text-sm uppercase text-black">Support Digital Creator</p>

        <div id="setup-area">
            <label class="block text-left font-black mb-2 uppercase text-[10px] text-black">Nominal (Minimal 100):</label>
            <input type="number" id="amount" min="100" placeholder="Rp 0" 
                class="w-full p-4 border-4 border-black font-black text-2xl mb-6 focus:outline-none focus:bg-yellow-50 text-black">
            
            <button onclick="prosesDonasi()" id="btn-pay"
                class="w-full bg-cyan-400 text-black font-black py-4 text-xl neo-btn uppercase tracking-widest hover:bg-cyan-300">
                GENERATE QRIS
            </button>
        </div>

        <div id="qris-area" class="hidden animate-in fade-in zoom-in duration-300">
            <p class="font-black mb-4 text-lg uppercase bg-black text-white py-1">Scan QRIS Di Bawah</p>
            
            <div class="border-4 border-black p-4 inline-block bg-white shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                <canvas id="qris-canvas" class="mx-auto"></canvas>
            </div>

            <div class="mt-6 p-3 border-2 border-dashed border-black">
                <p id="display-amount" class="text-3xl font-black text-black italic"></p>
                <p class="text-[10px] font-bold uppercase text-gray-500">ID: <span id="display-ref"></span></p>
            </div>
            
            <div class="mt-6 flex items-center justify-center gap-2">
                <div class="w-3 h-3 bg-red-600 rounded-full animate-ping"></div>
                <p class="font-black text-red-600 uppercase italic">Menunggu Pembayaran...</p>
            </div>
        </div>

        <div id="success-area" class="hidden">
            <div class="text-8xl mb-4 rotate-12">🎉</div>
            <h2 class="text-4xl font-black uppercase text-green-600 leading-none">BERHASIL!<br>TERIMA KASIH</h2>
            <p class="font-bold mt-4 border-2 border-black p-2 bg-green-50 text-black">Donasi telah diterima sistem.</p>
            <button onclick="location.reload()" class="mt-8 text-sm font-black underline uppercase hover:text-blue-600 italic text-black">Kembali ke Awal</button>
        </div>
    </div>

    <script>
        // DATA API & KEY
        const CONFIG = {
            API_KEY: "91b24c8aeb3d364a80742a847797553b",
            BASE_URL: "https://hokto.my.id/produksi/payment/",
            // Proxy untuk menghindari blokir browser (CORS)
            PROXY: "https://api.allorigins.win/get?url="
        };

        let pollingTimer;

        async function prosesDonasi() {
            const inputAmount = document.getElementById('amount');
            const btn = document.getElementById('btn-pay');
            const amount = parseInt(inputAmount.value);

            if (isNaN(amount) || amount < 100) {
                alert("Minimal Rp 100 ya Bang!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "SABAR...";
            const partnerRef = "MARA-" + Math.floor(Math.random() * 1000000);

            try {
                // Request via Proxy agar datanya bisa dibaca Browser
                const targetUrl = encodeURIComponent(`${CONFIG.BASE_URL}?api=create_qris`);
                const response = await fetch(CONFIG.PROXY + targetUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "X-API-KEY": CONFIG.API_KEY, // Kirim key di body jika header diblokir proxy
                        "amount": amount,
                        "partnerReferenceNo": partnerRef
                    })
                });

                const proxyResult = await response.json();
                const result = JSON.parse(proxyResult.contents); // Ambil data asli dari proxy
                
                // Ambil string teks QRIS
                const rawQRData = result.qrString || (result.data ? result.data.qrString : null);

                if (rawQRData) {
                    const canvas = document.getElementById('qris-canvas');
                    
                    // Render teks jadi QR Code tajam
                    QRCode.toCanvas(canvas, rawQRData, { 
                        width: 280,
                        margin: 2,
                        color: { dark: '#000000', light: '#FFFFFF' }
                    }, function (error) {
                        if (error) {
                            alert("Gagal gambar QR.");
                        } else {
                            document.getElementById('display-amount').innerText = `Rp ${amount.toLocaleString('id-ID')}`;
                            document.getElementById('display-ref').innerText = partnerRef;
                            document.getElementById('setup-area').classList.add('hidden');
                            document.getElementById('qris-area').classList.remove('hidden');

                            mulaiCekStatus(partnerRef);
                        }
                    });
                } else {
                    alert("Data QRIS kosong. Cek API Key atau Saldo Hokto.");
                    btn.disabled = false;
                    btn.innerText = "GENERATE QRIS";
                }

            } catch (err) {
                console.error(err);
                alert("Koneksi gagal. Coba lagi!");
                btn.disabled = false;
                btn.innerText = "GENERATE QRIS";
            }
        }

        function mulaiCekStatus(ref) {
            pollingTimer = setInterval(async () => {
                try {
                    const checkUrl = encodeURIComponent(`${CONFIG.BASE_URL}?api=check_status&partnerReferenceNo=${ref}`);
                    const resProxy = await fetch(CONFIG.PROXY + checkUrl);
                    const resRaw = await resProxy.json();
                    const data = JSON.parse(resRaw.contents);

                    if (data.status === "PAID" || (data.data && data.data.status === "PAID")) {
                        clearInterval(pollingTimer);
                        tampilkanSukses();
                    }
                } catch (e) {
                    console.log("Cek status...");
                }
            }, 5000);
        }

        function tampilkanSukses() {
            document.getElementById('qris-area').classList.add('hidden');
            document.getElementById('success-area').classList.remove('hidden');
        }
    </script>
</body>
</html>
